<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Lattice Signal Intelligence</title>
<meta name="description" content="Lattice Current now opens directly into the theme-led signal intelligence shell.">
<meta http-equiv="refresh" content="0; url=/event-dashboard.html">
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,rgba(197,255,109,.08),transparent 28%),radial-gradient(circle at top right,rgba(124,169,255,.08),transparent 24%),linear-gradient(180deg,#090c08 0%,#0d120c 40%,#0a0d09 100%);color:#edf3e7;font-family:SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace}
  main{max-width:560px;padding:24px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(17,23,15,.82)}
  h1{margin:0 0 10px;font-size:22px;color:#c5ff6d;letter-spacing:.04em}
  p{margin:0 0 10px;color:#c7d3c2;line-height:1.6}
  a{color:#edf3e7}
</style>
<script>
  (function(){
    const target = new URL('/event-dashboard.html', window.location.origin);
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target.toString());
  })();
</script>
</head>
<body>
  <main>
    <h1>Lattice Signal Intelligence</h1>
    <p>The legacy main page has been retired.</p>
    <p>You are being redirected to the integrated theme shell that now hosts live signals, the 2D geo lens, proposal review, validation, and runtime diagnostics.</p>
    <p><a href="/event-dashboard.html">Open the theme shell</a></p>
  </main>
</body>
</html>
