name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: node --import tsx --test tests/fast-keyword-extractor.test.mjs tests/auto-pipeline.test.mjs tests/master-daemon-guardrails.test.mjs
