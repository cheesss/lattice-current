name: math-model-regression

on:
  pull_request:
    paths:
      - 'src/services/math-models/**'
      - 'tests/math-models.test.mjs'
      - 'package.json'
      - '.github/workflows/math-model-regression.yml'
  push:
    branches:
      - main
    paths:
      - 'src/services/math-models/**'
      - 'tests/math-models.test.mjs'
      - 'package.json'
      - '.github/workflows/math-model-regression.yml'

jobs:
  test-math-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run math model regression tests
        run: npm run test:math
